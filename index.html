<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Gastos v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1d3566; font-family: sans-serif; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-white mb-6 flex justify-between">
            💰 Registro de Gastos
            <span id="total" class="text-blue-600 text-lg">$0</span>
        </h1>

        <div class="card p-6 mb-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tipo de Gasto</label>
                    <select id="tipo" class="w-full mt-1 p-2 border rounded-md focus:ring-blue-500 focus:border-blue-500">
                        <option value="Alimentación">Alimentación</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Servicios">Servicios</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Entretenimiento">Entretenimiento</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del Gasto</label>
                    <input type="text" id="nombre" placeholder="Ej: Corralazo" class="w-full mt-1 p-2 border rounded-md">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Valor ($)</label>
                    <input type="number" id="valor" placeholder="0.00" class="w-full mt-1 p-2 border rounded-md">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Medio de Pago</label>
                    <select id="medio_pago" class="w-full mt-1 p-2 border rounded-md focus:ring-blue-500 focus:border-blue-500">
                        <option value="Efectivo">Efectivo</option>
                        <option value="Tarjeta Débito">Tarjeta Débito</option>
                        <option value="Tarjeta Gold">Tarjeta Gold</option>
                        <option value="Tarjeta Zero">Tarjeta Zero</option>
                    </select>
                </div>

                 <div id="contenedor_cuotas" class="hidden mt-4 p-3 bg-blue-50 rounded-lg border border-blue-100">
                    <label class="block text-sm font-medium text-blue-800">Número de Cuotas</label>
                    <input type="number" id="cuotas" value="1" min="1" max="48" 
                           class="w-full mt-1 p-2 border border-blue-300 rounded-md focus:ring-blue-500">
                    <p class="text-[10px] text-blue-400 mt-1">* Solo para Tarjetas de Crédito (Gold/Zero)</p>
                </div>
                
                <button onclick="agregarGasto()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700 transition">
                    Registrar Gasto
                </button>
            </div>
        </div>

        <h2 class="text-lg font-semibold mb-3 text-white">Historial Reciente</h2>
        <div id="lista-gastos" class="space-y-2">
            </div>
    </div>

    <script>
        let gastos = JSON.parse(localStorage.getItem('mis_gastos')) || [];

        function actualizarUI() {
            const lista = document.getElementById('lista-gastos');
            const totalDisplay = document.getElementById('total');
            lista.innerHTML = '';
            
            let suma = 0;
            gastos.forEach((g, index) => {
                suma += parseFloat(g.valor);
                lista.innerHTML += `
                    <div class="card p-4 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800">${g.nombre}</p>
                            <p class="text-xs text-gray-500 uppercase">${g.tipo}</p>
                            <p class="text-[10px] text-blue-500 font-medium mt-1">💳 ${g.medioPago}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-blue-600 font-semibold">$${parseFloat(g.valor).toLocaleString()}</p>
                            <button onclick="eliminar(${index})" class="text-red-400 text-xs underline">Eliminar</button>
                        </div>
                    </div>
                `;
            });
            totalDisplay.innerText = `$${suma.toLocaleString()}`;
            localStorage.setItem('mis_gastos', JSON.stringify(gastos));
        }
        // 1. Nueva función para agregar a la cola de pendientes
            async function agregarGasto() {
                const tipo = document.getElementById('tipo').value;
                const nombre = document.getElementById('nombre').value;
                const valor = document.getElementById('valor').value;
                const medioPago = document.getElementById('medio_pago').value;

                // Capturar cuotas: si es crédito usa el valor del input, si no, es 1
                    let cuotas = 1;
                    if (medioPago === 'Tarjeta Gold' || medioPago === 'Tarjeta Zero') {
                        cuotas = document.getElementById('cuotas').value || 1;
                    }
            
                if(!nombre || !valor) return alert("Llena los campos");
            
                const nuevoGasto = { 
                    tipo, 
                    nombre, 
                    valor: parseFloat(valor),
                    medioPago,
                    cuotas,
                    fecha: new Date().toLocaleString(),
                    id: Date.now() // ID único para control
                };
            
                // Guardar en el historial local (lo que ya ves en pantalla)
                gastos.unshift(nuevoGasto);
                actualizarUI();
            
                // GUARDAR EN COLA DE PENDIENTES
                let pendientes = JSON.parse(localStorage.getItem('cola_sync')) || [];
                pendientes.push(nuevoGasto);
                localStorage.setItem('cola_sync', JSON.stringify(pendientes));
            
                // Intentar sincronizar inmediatamente
                intentarSincronizar();
            
                document.getElementById('nombre').value = '';
                document.getElementById('valor').value = '';
            }
            
            // 2. Función que procesa los pendientes
            async function intentarSincronizar() {
                if (!navigator.onLine) return; // Si no hay internet, ni lo intenta
            
                let pendientes = JSON.parse(localStorage.getItem('cola_sync')) || [];
                if (pendientes.length === 0) return;
            
                const url_google_sheets = "https://script.google.com/macros/s/AKfycbz1rBcFQ1SKp3vsIvWp0anERisxmNzWKWpOGGu3koPCakIA_cucF2ezQ6iDMfDbuF5m/exec";
            
                // Procesamos cada pendiente
                for (let i = 0; i < pendientes.length; i++) {
                    try {
                        await fetch(url_google_sheets, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify(pendientes[i])
                        });
                        
                        // Si tiene éxito (o al menos se envió), lo quitamos de la cola
                        pendientes.splice(i, 1);
                        i--; 
                    } catch (error) {
                        console.log("Fallo de red, se queda en cola");
                        break; // Detiene el bucle si falla la red
                    }
                }
                
                localStorage.setItem('cola_sync', JSON.stringify(pendientes));
            }
            
            // 3. Detectar cuando vuelve el internet automáticamente
            window.addEventListener('online', intentarSincronizar);
        
        function eliminar(index) {
            gastos.splice(index, 1);
            actualizarUI();
        }
        document.getElementById('medio_pago').addEventListener('change', function() {
            const medio = this.value;
            const contenedor = document.getElementById('contenedor_cuotas');
            
            // Lógica condicional: Si es Gold o Zero, mostramos el campo
            if (medio === 'Tarjeta Gold' || medio === 'Tarjeta Zero') {
                contenedor.classList.remove('hidden');
            } else {
                contenedor.classList.add('hidden');
                document.getElementById('cuotas').value = 1; // Reset a 1 si cambia a efectivo/débito
            }
        });
        // Carga inicial
        actualizarUI();
    </script>
</body>

</html>
