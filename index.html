<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Cambié esto a link rel="icon" porque un manifest debe ser un archivo .json -->
    <link rel="icon" href="IconoApp.png">
    <title>Mis Gastos v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1d3566; font-family: sans-serif; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-white mb-6 flex justify-between">
            💰 Registro de Gastos
            <span id="total" class="text-blue-600 text-lg">$0</span>
        </h1>

        <div class="card p-6 mb-6">
            <div class="space-y-4">
                <!-- TIPO DE GASTO -->
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tipo de Gasto</label>
                    <select id="tipo" onchange="verificarTipo()" class="w-full mt-1 p-2 border rounded-md focus:ring-blue-500 focus:border-blue-500">
                        <option value="Alimentación">Alimentación</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Cuidado Personal">Cuidado Personal</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Entretenimiento">Entretenimiento</option>
                        <option value="Mascotas">Mascotas</option>
                        <option value="Regalos">Regalos</option>
                        <option value="Pago_Deuda">Pago Deuda</option>
                    </select>
                </div>

                <!-- SELECTOR DE DEUDAS (Solo aparece en Pago_Deuda) -->
                <div id="contenedorDeudas" style="display:none;" class="mt-4 p-3 bg-yellow-50 rounded-lg border border-yellow-200">
                    <label class="block text-sm font-medium text-yellow-800">Selecciona la deuda a pagar:</label>
                    <select id="deudaSeleccionada" class="w-full mt-1 p-2 border border-yellow-300 rounded-md">
                        <option value="">Cargando deudas...</option>
                    </select>
                </div>

                <!-- NOMBRE DEL GASTO -->
                <div id="contenedorNombre">
                    <label class="block text-sm font-medium text-gray-700">Nombre del Gasto</label>
                    <input type="text" id="nombre" placeholder="Ej: Corralazo" class="w-full mt-1 p-2 border rounded-md">
                </div>

                <!-- VALOR -->
                <div>
                    <label class="block text-sm font-medium text-gray-700">Valor ($)</label>
                    <input type="text" id="valor" oninput="formatearMiles(this)" placeholder="0" class="w-full mt-1 p-2 border rounded-md font-semibold text-gray-800">
                </div>
                
                <!-- MEDIO DE PAGO -->
                <div>
                    <label class="block text-sm font-medium text-gray-700">Medio de Pago</label>
                    <select id="medio_pago" class="w-full mt-1 p-2 border rounded-md focus:ring-blue-500 focus:border-blue-500">
                        <option value="Efectivo">Efectivo</option>
                        <option value="Tarjeta Débito">Tarjeta Débito</option>
                        <option value="Tarjeta Gold">Tarjeta Gold</option>
                        <option value="Tarjeta Zero">Tarjeta Zero</option>
                    </select>
                </div>

                <!-- CUOTAS -->
                <div id="contenedor_cuotas" class="hidden mt-4 p-3 bg-blue-50 rounded-lg border border-blue-100">
                    <label class="block text-sm font-medium text-blue-800">Número de Cuotas</label>
                    <input type="number" id="cuotas" value="1" min="1" max="48" class="w-full mt-1 p-2 border border-blue-300 rounded-md">
                </div>
                
                <button onclick="agregarGasto()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700 transition">
                    Registrar Gasto
                </button>
            </div>
        </div>

        <h2 class="text-lg font-semibold mb-3 text-white">Historial Reciente</h2>
        <div id="lista-gastos" class="space-y-2"></div>
    </div>

                <div id="modalDeuda" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden z-50" onclick="cerrarModal(event)">
                <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 transform transition-all" onclick="event.stopPropagation()">
                    <h3 id="modalNombre" class="text-xl font-bold text-gray-900 border-b pb-2 mb-4 flex items-center gap-2">
                        📌 Nombre de la Deuda
                    </h3>
                    
                    <div class="space-y-3 text-sm text-gray-600">
                        <div class="flex justify-between border-b border-gray-100 pb-1">
                            <span class="font-medium text-gray-500">Fecha de compra:</span>
                            <span id="modalFecha" class="text-gray-900 font-semibold">-</span>
                        </div>
                        <div class="flex justify-between border-b border-gray-100 pb-1">
                            <span class="font-medium text-gray-500">Tipo de pago:</span>
                            <span id="modalTarjeta" class="px-2 py-0.5 bg-blue-100 text-blue-800 rounded-full text-xs font-bold">-</span>
                        </div>
                        <div class="flex justify-between border-b border-gray-100 pb-1">
                            <span class="font-medium text-gray-500">Valor total compra:</span>
                            <span id="modalValorTotal" class="text-gray-900 font-semibold">-</span>
                        </div>
                        <div class="flex justify-between border-b border-gray-100 pb-1">
                            <span class="font-medium text-gray-500">Cuotas restantes:</span>
                            <span id="modalCuotas" class="text-gray-900 font-semibold">-</span>
                        </div>
                        <div class="flex justify-between pt-2">
                            <span class="font-bold text-gray-700">Valor por pagar:</span>
                            <span id="modalValorRestante" class="text-green-600 font-bold text-base">-</span>
                        </div>
                    </div>
            
                    <p class="text-[10px] text-gray-400 text-center mt-6">* Toca afuera de este cuadro para cerrar</p>
                </div>
            </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbz_RptRRgPELXm5avggUt67QDjOrHMu4DAQxVcDJnosFbaRhgAeQt_MewzBO4ap2nyU/exec";
        let gastos = JSON.parse(localStorage.getItem('mis_gastos')) || [];

        // --- LÓGICA DE INTERFAZ ---

        function verificarTipo() {
            const tipo = document.getElementById("tipo").value;
            const contDeudas = document.getElementById("contenedorDeudas");
            const contNombre = document.getElementById("contenedorNombre");
            
            if (tipo === "Pago_Deuda") {
                contDeudas.style.display = "block";
                contNombre.style.display = "none";
                cargarDeudas();
            } else {
                contDeudas.style.display = "none";
                contNombre.style.display = "block";
            }
        }

        // Variable global para almacenar los detalles completos de las deudas
        let deudasTemporales = [];

// 1. Modificación para cargar solo los nombres en el cuadro seleccionable
async function cargarDeudas() {
    try {
        const response = await fetch(URL_SCRIPT);
        deudasTemporales = await response.json(); // Guardamos todo el array aquí
        
        const selectDeuda = document.getElementById("deudaSeleccionada");
        selectDeuda.innerHTML = '<option value="">-- Selecciona una deuda --</option>';
        
        deudasTemporales.forEach((deuda, index) => {
            let opcion = document.createElement("option");
            opcion.value = deuda.nombre;
            opcion.text = deuda.nombre; // ¡Ahora solo muestra el NOMBRE limpio!
            opcion.dataset.index = index; // Guardamos su posición para buscarla rápido
            selectDeuda.appendChild(opcion);
        });
    } catch (error) {
        console.error("Error cargando deudas:", error);
    }
}

// 2. Escuchar cuando el usuario selecciona una deuda para abrir el cuadro emergente
document.getElementById('deudaSeleccionada').addEventListener('change', function() {
    const opcionSeleccionada = this.options[this.selectedIndex];
    if (!opcionSeleccionada || this.value === "") return;

    const index = opcionSeleccionada.dataset.index;
    const deuda = deudasTemporales[index];

    if (deuda) {
        // Formateadores de dinero locales
        const formatearDinero = (num) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(num);

        // Supongamos que el valor que viene es el total de la compra. 
        // Si calculamos el valor aproximado restante sería: (ValorCompra / CuotasIniciales que asumo o calculo)
        // Como el doGet actual nos da 'valor' y 'cuotas' vigentes, calculamos el valor de la cuota y lo multiplicamos por las que faltan.
        // Nota: En tu doGet del Apps Script envías fila[1] (Valor total) y fila[2] (Cuotas vigentes).
        // Si tu Excel calcula el valor mensual en la columna E, podrías usarlo, pero matemáticamente con lo que recibe la app:
        let valorRestante = parseFloat(deuda.valor) * parseInt(deuda.cuotas); 

        // Inyectar datos en el cuadro emergente
        document.getElementById('modalNombre').innerText = `📌 ${deuda.nombre}`;
        document.getElementById('modalFecha').innerText = deuda.fecha || 'No registrada';
        document.getElementById('modalTarjeta').innerText = deuda.tarjeta;
        document.getElementById('modalValorTotal').innerText = formatearDinero(deuda.valor); // Valor de la cuota mensual actual en tu tabla
        document.getElementById('modalCuotas').innerText = `${deuda.cuotas} pendientes`;
        document.getElementById('modalValorRestante').innerText = formatearDinero(valorRestante);

        // Mostrar el cuadro emergente quitando la clase 'hidden'
        document.getElementById('modalDeuda').classList.remove('hidden');
    }
});

// 3. Función para cerrar el cuadro emergente al dar clic afuera
function cerrarModal(event) {
    document.getElementById('modalDeuda').classList.add('hidden');
}

        document.getElementById('medio_pago').addEventListener('change', function() {
            const contenedor = document.getElementById('contenedor_cuotas');
            if (this.value === 'Tarjeta Gold' || this.value === 'Tarjeta Zero') {
                contenedor.classList.remove('hidden');
            } else {
                contenedor.classList.add('hidden');
                document.getElementById('cuotas').value = 1;
            }
        });

        // --- LÓGICA DE GASTOS ---

        function actualizarUI() {
            const lista = document.getElementById('lista-gastos');
            const totalDisplay = document.getElementById('total');
            lista.innerHTML = '';
            let suma = 0;
            gastos.forEach((g, index) => {
                suma += parseFloat(g.valor);
                lista.innerHTML += `
                    <div class="card p-4 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800">${g.nombre}</p>
                            <p class="text-xs text-gray-500 uppercase">${g.tipo}</p>
                            <p class="text-[10px] text-blue-500 font-medium mt-1">💳 ${g.medioPago}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-blue-600 font-semibold">$${parseFloat(g.valor).toLocaleString()}</p>
                            <button onclick="eliminar(${index})" class="text-red-400 text-xs underline">Eliminar</button>
                        </div>
                    </div>`;
            });
            totalDisplay.innerText = `$${suma.toLocaleString()}`;
            localStorage.setItem('mis_gastos', JSON.stringify(gastos));
        }

        async function agregarGasto() {
            const tipo = document.getElementById('tipo').value;
            const valor = obtenerValorNumerico(); // Trae el número limpio sin puntos
            let medioPago = document.getElementById('medio_pago').value;
            let nombre, cuotas = "";
            

            if (tipo === "Pago_Deuda") {
                const sel = document.getElementById("deudaSeleccionada");
                nombre = sel.value;
                
                // Buscamos la tarjeta desde nuestra variable global usando el index seleccionado
                const indexIndex = sel.options[sel.selectedIndex].dataset.index;
                medioPago = deudasTemporales[indexIndex].tarjeta;
                cuotas = "PAGO"; 
            }
            else {
                nombre = document.getElementById('nombre').value;
                if (medioPago === 'Tarjeta Gold' || medioPago === 'Tarjeta Zero') {
                    cuotas = document.getElementById('cuotas').value || 1;
                }
            }

            if(!nombre || valor === 0) return alert("Llena los campos");

            const nuevoGasto = { 
                tipo, nombre, valor: parseFloat(valor), medioPago, cuotas,
                fecha: new Date().toLocaleString(), id: Date.now() 
            };

            gastos.unshift(nuevoGasto);
            actualizarUI();

            // Cola de sincronización
            let pendientes = JSON.parse(localStorage.getItem('cola_sync')) || [];
            pendientes.push(nuevoGasto);
            localStorage.setItem('cola_sync', JSON.stringify(pendientes));
            
            intentarSincronizar();

            // Reset campos
            document.getElementById('nombre').value = '';
            document.getElementById('valor').value = '';
        }

        async function intentarSincronizar() {
            if (!navigator.onLine) return;
            let pendientes = JSON.parse(localStorage.getItem('cola_sync')) || [];
            if (pendientes.length === 0) return;

            for (let i = 0; i < pendientes.length; i++) {
                try {
                    await fetch(URL_SCRIPT, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(pendientes[i])
                    });
                    pendientes.splice(i, 1);
                    i--; 
                } catch (error) { break; }
            }
            localStorage.setItem('cola_sync', JSON.stringify(pendientes));
        }

        function eliminar(index) {
            gastos.splice(index, 1);
            actualizarUI();
        }

        window.addEventListener('online', intentarSincronizar);
        actualizarUI();

        // Función que da formato con puntos de miles mientras escribes
            function formatearMiles(input) {
                // Quita cualquier cosa que no sea un número
                let valorLimpio = input.value.replace(/\D/g, "");
                
                // Si está vacío, lo deja así
                if (valorLimpio === "") {
                    input.value = "";
                    return;
                }
                
                // Le pone los puntos de miles (Formato Colombia/Latam)
                input.value = new Intl.NumberFormat('es-CO').format(parseInt(valorLimpio));
            }
            
            // Función auxiliar para obtener el número real sin puntos al momento de enviar
            function obtenerValorNumerico() {
                const valorVisual = document.getElementById('valor').value;
                // Quita todos los puntos para que vuelva a ser un número limpio (ej: "1.500.000" -> 1500000)
                return parseFloat(valorVisual.replace(/\./g, "")) || 0;
            }
    </script>
</body>
</html>
